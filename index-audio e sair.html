<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#0f172a">
<title>Irmaos Telexa · ACM-1751</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
:root{
  --bg0:#0f172a;--bg1:#1e293b;--bg2:#334155;--bg3:#475569;
  --accent:#22d3ee;--accent2:#0891b2;--green:#4ade80;--red:#f87171;--yellow:#fbbf24;
  --text1:#f1f5f9;--text2:#94a3b8;--text3:#64748b;
  --radius:12px;--radius-sm:8px;
  --font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg0);color:var(--text1);font-family:var(--font);overflow:hidden}
.app{display:flex;flex-direction:column;height:100vh;height:100dvh;max-width:430px;margin:0 auto;position:fixed;top:0;left:0;right:0;bottom:0}

/* TOPBAR */
.topbar{padding:14px 16px 10px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #1e293b;background:var(--bg0)}
.truck-badge{width:38px;height:38px;border-radius:var(--radius-sm);background:linear-gradient(135deg,var(--accent2),var(--accent));display:flex;align-items:center;justify-content:center;font-size:18px;color:#fff;flex-shrink:0}
.topbar-info{flex:1}
.topbar-title{font-size:15px;font-weight:600;color:var(--text1)}
.topbar-sub{font-size:11px;color:var(--text2);margin-top:1px}
.topbar-placa{font-family:var(--mono);font-size:11px;background:var(--bg2);color:var(--accent);padding:2px 8px;border-radius:4px;border:1px solid var(--bg3)}

/* CONTENT */
.content{flex:1;overflow-y:auto;overflow-x:hidden;padding:14px;padding-bottom:80px;-webkit-overflow-scrolling:touch;min-height:0}
.content::-webkit-scrollbar{display:none}
.screen{display:none}
.screen.active{display:block;animation:fadeIn .18s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* NAV */
.nav{display:flex;background:var(--bg1);border-top:1px solid var(--bg2);padding:6px 0;padding-bottom:max(10px,env(safe-area-inset-bottom));flex-shrink:0;position:relative;z-index:10}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;border:none;background:none;cursor:pointer;padding:5px 2px;color:var(--text3);font-size:10px;font-family:var(--font);transition:color .15s}
.nb.active{color:var(--accent)}
.nb i{font-size:21px;line-height:1}
.nb-pip{width:4px;height:4px;border-radius:50%;background:var(--accent);margin:0 auto;opacity:0;transition:opacity .15s}
.nb.active .nb-pip{opacity:1}

/* CARDS */
.card{background:var(--bg1);border-radius:var(--radius);border:1px solid var(--bg2);padding:14px;margin-bottom:10px}
.card-hdr{font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px;display:flex;align-items:center;gap:5px}
.card-hdr i{font-size:13px}

/* METRICS */
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.metric{background:var(--bg1);border:1px solid var(--bg2);border-radius:var(--radius-sm);padding:11px 12px}
.mlabel{font-size:10px;color:var(--text3);margin-bottom:3px;font-weight:500;text-transform:uppercase;letter-spacing:.4px}
.mval{font-size:17px;font-weight:600;color:var(--text1);font-family:var(--mono)}
.mval.g{color:var(--green)}
.mval.r{color:var(--red)}
.mval.y{color:var(--yellow)}

/* ROWS */
.drow{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--bg2);font-size:12px}
.drow:last-child{border:none}
.dlabel{color:var(--text2);flex:1}
.dval{font-weight:500;color:var(--text1);font-family:var(--mono)}
.dval.pos{color:var(--green)}
.dval.neg{color:var(--red)}

/* BADGES */
.badge{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:500;font-family:var(--mono)}
.b-rec{background:#052e16;color:var(--green);border:1px solid #166534}
.b-dep{background:#2d0707;color:var(--red);border:1px solid #7f1d1d}
.b-ext{background:#2d1f07;color:var(--yellow);border:1px solid #78350f}

/* FILTER CHIPS */
.chips{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:10px}
.chips::-webkit-scrollbar{display:none}
.chip{padding:5px 13px;border:1px solid var(--bg3);border-radius:20px;background:none;font-size:11px;cursor:pointer;color:var(--text2);white-space:nowrap;font-family:var(--font);transition:all .15s}
.chip.on{background:var(--accent);border-color:var(--accent);color:#0f172a;font-weight:600}

/* PROGRESS */
.prog-bg{background:var(--bg2);border-radius:20px;height:7px;overflow:hidden;margin-top:5px}
.prog{height:7px;border-radius:20px;transition:width .5s ease}

/* FORMS */
.fgroup{margin-bottom:11px}
.flabel{font-size:11px;color:var(--text3);margin-bottom:4px;display:block;font-weight:500;text-transform:uppercase;letter-spacing:.4px}
input,select{width:100%;padding:10px 12px;border:1px solid var(--bg2);border-radius:var(--radius-sm);background:var(--bg1);color:var(--text1);font-size:13px;font-family:var(--font);outline:none;transition:border-color .15s}
input:focus,select:focus{border-color:var(--accent)}
input::placeholder{color:var(--text3)}
select option{background:var(--bg1)}

/* TIPO BTNS */
.tipo-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.tbtn{padding:9px 4px;border:1px solid var(--bg2);border-radius:var(--radius-sm);background:var(--bg1);font-size:11px;cursor:pointer;color:var(--text3);text-align:center;font-family:var(--font);transition:all .15s}
.tbtn.tr{background:#052e16;border-color:#166534;color:var(--green);font-weight:600}
.tbtn.td{background:#2d0707;border-color:#7f1d1d;color:var(--red);font-weight:600}
.tbtn.te{background:#2d1f07;border-color:#78350f;color:var(--yellow);font-weight:600}

/* BTNS */
.btn-p{width:100%;padding:12px;background:var(--accent);color:#0f172a;border:none;border-radius:var(--radius-sm);font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;font-family:var(--font);transition:opacity .15s}
.btn-p:active{opacity:.8}
.btn-o{width:100%;padding:10px;background:none;color:var(--text1);border:1px solid var(--bg2);border-radius:var(--radius-sm);font-size:12px;cursor:pointer;margin-bottom:8px;font-family:var(--font);transition:background .15s}
.btn-o:active{background:var(--bg2)}
.btn-del{background:none;border:none;color:var(--red);font-size:13px;cursor:pointer;padding:4px;opacity:.7}
.btn-del:hover{opacity:1}

/* LANCAMENTO ITEM */
.litem{background:var(--bg1);border-radius:var(--radius-sm);border:1px solid var(--bg2);padding:10px 12px;margin-bottom:5px;display:flex;align-items:center;gap:10px;transition:border-color .15s}
.litem:hover{border-color:var(--bg3)}
.linfo{flex:1;min-width:0}
.ldesc{font-size:12px;font-weight:500;color:var(--text1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lmeta{font-size:10px;color:var(--text3);margin-top:2px;display:flex;align-items:center;gap:5px}
.lval{font-size:13px;font-weight:600;font-family:var(--mono);white-space:nowrap}

/* QUINZENA BTN */
.qbtn{background:var(--bg1);border:1px solid var(--bg2);border-radius:var(--radius-sm);padding:10px 13px;margin-bottom:6px;width:100%;text-align:left;cursor:pointer;display:flex;justify-content:space-between;align-items:center;transition:border-color .15s}
.qbtn:hover{border-color:var(--bg3)}
.qperiodo{font-size:12px;font-weight:500;color:var(--text1)}
.qinfo{font-size:10px;color:var(--text3);margin-top:2px}

/* SOCIOS */
.socios-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.socio{border-radius:var(--radius-sm);padding:13px;text-align:center;background:linear-gradient(135deg,#052e16,#064e3b);border:1px solid #166534}
.socio-nome{font-size:10px;color:#4ade80;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px;font-weight:500}
.socio-val{font-size:18px;font-weight:600;color:var(--green);font-family:var(--mono)}

/* DASH */
.dash-sec{margin-bottom:14px}
.dash-title{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:8px}
.bar-chart{display:flex;flex-direction:column;gap:9px}
.brow{display:flex;align-items:center;gap:8px}
.blabel{font-size:10px;color:var(--text2);width:72px;flex-shrink:0;text-align:right;font-family:var(--mono)}
.btrack{flex:1;background:var(--bg2);border-radius:20px;height:22px;position:relative;overflow:hidden}
.bfill{height:100%;border-radius:20px;display:flex;align-items:center;justify-content:flex-end;padding-right:8px;font-size:10px;font-weight:600;color:#fff;font-family:var(--mono);min-width:28px;transition:width .6s ease}
.comp-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.comp-item{background:var(--bg1);border:1px solid var(--bg2);border-radius:var(--radius-sm);padding:10px;text-align:center}
.comp-per{font-size:9px;color:var(--text3);margin-bottom:3px;font-family:var(--mono)}
.comp-val{font-size:14px;font-weight:600;font-family:var(--mono)}
.comp-sub{font-size:9px;color:var(--text3);margin-top:2px}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
.modal{background:var(--bg1);border-radius:16px 16px 0 0;padding:18px 16px;width:100%;max-width:430px;max-height:87vh;overflow-y:auto;border-top:1px solid var(--bg2)}
.modal-hdr{font-size:14px;font-weight:600;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;color:var(--text1)}
.mclose{background:none;border:none;cursor:pointer;color:var(--text3);font-size:20px}

.section-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin:12px 0 6px 2px;font-weight:500}
.tag{display:inline-block;font-size:10px;padding:2px 9px;border-radius:12px;background:rgba(34,211,238,.15);color:var(--accent);margin-bottom:8px;border:1px solid rgba(34,211,238,.3);font-family:var(--mono)}

.pin-screen{position:fixed;inset:0;background:var(--bg0);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px}
.pin-logo{width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,var(--accent2),var(--accent));display:flex;align-items:center;justify-content:center;font-size:26px;color:#fff;margin-bottom:20px}
.pin-title{font-size:18px;font-weight:600;color:var(--text1);margin-bottom:6px}
.pin-sub{font-size:12px;color:var(--text3);margin-bottom:32px;text-align:center}
.pin-dots{display:flex;gap:14px;margin-bottom:32px}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--bg3);background:none;transition:all .15s}
.pin-dot.filled{background:var(--accent);border-color:var(--accent)}
.pin-dot.error{background:var(--red);border-color:var(--red)}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;max-width:260px}
.pin-key{height:64px;border-radius:var(--radius);border:1px solid var(--bg2);background:var(--bg1);color:var(--text1);font-size:22px;font-weight:500;cursor:pointer;font-family:var(--mono);transition:all .12s;display:flex;align-items:center;justify-content:center}
.pin-key:active{background:var(--bg2);transform:scale(0.95)}
.pin-key.empty{border:none;background:none;cursor:default}
.pin-key.del{font-size:18px;color:var(--text2)}
.pin-shake{animation:shake .35s ease}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-6px)}80%{transform:translateX(6px)}}

.voice-btn{width:100%;padding:14px;background:linear-gradient(135deg,#0891b2,#22d3ee);color:#0f172a;border:none;border-radius:var(--radius-sm);font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;font-family:var(--font);margin-bottom:10px;transition:all .15s}
.voice-btn:active{opacity:.85;transform:scale(0.98)}
.voice-btn.recording{background:linear-gradient(135deg,#be123c,#f87171);animation:pulse-rec 1.2s infinite}
@keyframes pulse-rec{0%,100%{box-shadow:0 0 0 0 rgba(248,113,113,.4)}50%{box-shadow:0 0 0 10px rgba(248,113,113,0)}}

.voice-modal{background:var(--bg1);border-radius:16px 16px 0 0;padding:20px 16px;width:100%;max-width:430px;border-top:1px solid var(--bg2)}
.voice-status{text-align:center;padding:20px 0;color:var(--text2);font-size:13px}
.voice-wave{display:flex;align-items:center;justify-content:center;gap:4px;height:40px;margin:10px 0}
.voice-bar{width:4px;border-radius:4px;background:var(--accent);animation:wave 1s ease-in-out infinite}
.voice-bar:nth-child(1){animation-delay:0s;height:16px}
.voice-bar:nth-child(2){animation-delay:.1s;height:28px}
.voice-bar:nth-child(3){animation-delay:.2s;height:40px}
.voice-bar:nth-child(4){animation-delay:.3s;height:28px}
.voice-bar:nth-child(5){animation-delay:.4s;height:16px}
@keyframes wave{0%,100%{transform:scaleY(1)}50%{transform:scaleY(1.6)}}

.voice-result{background:var(--bg2);border-radius:var(--radius-sm);padding:14px;margin:12px 0;border-left:3px solid var(--accent)}
.voice-result-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;font-weight:500}
.voice-result-text{font-size:13px;color:var(--text1);line-height:1.5}

.voice-parsed{margin:12px 0}
.vp-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--bg2);font-size:13px}
.vp-row:last-child{border:none}
.vp-label{color:var(--text3);font-size:11px;text-transform:uppercase;letter-spacing:.4px}
.vp-val{font-weight:600;color:var(--text1);font-family:var(--mono)}
.vp-val.pos{color:var(--green)}
.vp-val.neg{color:var(--red)}
.vp-val.warn{color:var(--yellow)}

.voice-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px}
.btn-confirm{padding:12px;background:var(--green);color:#0f172a;border:none;border-radius:var(--radius-sm);font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font)}
.btn-cancel-v{padding:12px;background:var(--bg2);color:var(--text1);border:none;border-radius:var(--radius-sm);font-size:13px;font-weight:500;cursor:pointer;font-family:var(--font)}
.thinking{display:flex;align-items:center;gap:8px;color:var(--text2);font-size:12px;padding:12px 0}
.thinking-dots span{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--accent);animation:td .8s infinite;margin:0 2px}
.thinking-dots span:nth-child(2){animation-delay:.15s}
.thinking-dots span:nth-child(3){animation-delay:.3s}
@keyframes td{0%,80%,100%{transform:scale(0.6);opacity:.4}40%{transform:scale(1);opacity:1}}
</style>
</head>

<script>

const PIN_CORRETO = '1751';
const PIN_SESSION = 'telexa_pin_ok';
let pinDigitado = '';

function pinKey(n){
  if(pinDigitado.length >= 4) return;
  pinDigitado += n;
  atualizarDots();
  if(pinDigitado.length === 4) setTimeout(verificarPin, 120);
}

function pinDel(){
  pinDigitado = pinDigitado.slice(0,-1);
  atualizarDots();
}

function atualizarDots(){
  for(let i=0;i<4;i++){
    const d = document.getElementById('pd'+i);
    d.classList.toggle('filled', i < pinDigitado.length);
    d.classList.remove('error');
  }
}

function verificarPin(){
  if(pinDigitado === PIN_CORRETO){
    // sem cache de sessao - sempre pede ao abrir
    const ps = document.getElementById('pin-screen');
    ps.style.transition='opacity .3s';
    ps.style.opacity='0';
    setTimeout(()=>ps.style.display='none', 300);
  } else {
    for(let i=0;i<4;i++) document.getElementById('pd'+i).classList.add('error');
    document.getElementById('pin-dots').classList.add('pin-shake');
    setTimeout(()=>{
      pinDigitado='';
      atualizarDots();
      document.getElementById('pin-dots').classList.remove('pin-shake');
    }, 500);
  }
}

// PIN sempre solicitado ao abrir


function sair(){
  if(confirm('Deseja sair do app?')){
    document.getElementById('pin-screen').style.display='flex';
    document.getElementById('pin-screen').style.opacity='1';
    pinDigitado='';
    atualizarDots();
  }
}

const SOCIOS=['Telexa 1','Telexa 2'];
const INIT={periodos:[

    {id:'l2',desc:'Credito quinzena anterior',tipo:'receita',valor:2000.00,data:'16/03/2026'},
    {id:'l3',desc:'Pago saldo quinzena anterior',tipo:'despesa',valor:-4030.76,data:'16/03/2026'},
    {id:'l4',desc:'Vale combustivel motorista (3x)',tipo:'despesa',valor:-2874.68,data:'16/03/2026'},
    {id:'l5',desc:'Retencao INSS',tipo:'despesa',valor:-548.30,data:'16/03/2026'},
    {id:'l6',desc:'Retencao SEST/SENAT',tipo:'despesa',valor:-68.53,data:'16/03/2026'},
    {id:'l7',desc:'Rastreamento',tipo:'despesa',valor:-92.00,data:'16/03/2026'},
  ]},

async function interpretarComClaude(texto){
  const prompt = `Interprete este lancamento financeiro de uma empresa de transporte de caminhao e extraia as informacoes em JSON.

Texto do usuario: "${texto}"

Retorne SOMENTE um JSON valido com estes campos:
{
  "descricao": "descricao curta do lancamento",
  "valor": 0.00,
  "tipo": "receita" ou "despesa" ou "extra",
  "confianca": "alta" ou "media" ou "baixa"
}

Regras:
- tipo "receita": quando recebeu dinheiro, pagamento da cooperativa, saldo, credito
- tipo "despesa": combustivel, pneu, borracha, manutencao, retencoes, impostos, kit, bateria
- tipo "extra": gastos pequenos pagos do bolso, servicos avulsos
- valor sempre positivo, sem simbolo
- confianca "alta" se entendeu claramente, "media" se deduziu, "baixa" se incerto`;

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 200,
        messages: [{role:'user', content: prompt}]
      })
    });
    const data = await resp.json();
    const raw = data.content[0].text.replace(/```json|```/g,'').trim();
    const parsed = JSON.parse(raw);
    mostrarConfirmacao(texto, parsed);
  } catch(e) {
    interpretarLocal(texto);
  }
}

function interpretarLocal(texto){
  const t = texto.toLowerCase();
  let valor = 0, tipo = 'despesa', descricao = texto;

  const numeros = t.match(/\d+[.,]?\d*/g);
  if(numeros){
    for(const n of numeros){
      const v = parseFloat(n.replace(',','.'));
      if(v > 1) { valor = v; break; }
    }
  }

  if(t.includes('recebi')||t.includes('recebeu')||t.includes('pagamento')||t.includes('cooperativa')||t.includes('saldo')) tipo='receita';
  else if(t.includes('gasei')||t.includes('gasei')||t.includes('posto')||t.includes('combustiv')) tipo='despesa';
  else if(t.includes('pneu')||t.includes('borracha')||t.includes('manutencao')) tipo='despesa';
  else if(t.includes('comprei')||t.includes('paguei')||t.includes('gastei')) tipo='extra';

  mostrarConfirmacao(texto, {descricao: texto, valor, tipo, confianca:'media'});
}

function mostrarConfirmacao(textoOriginal, parsed){
  const corConfianca = parsed.confianca==='alta'?'var(--green)':parsed.confianca==='media'?'var(--yellow)':'var(--red)';
  const tipoLabel = parsed.tipo==='receita'?'Receita':parsed.tipo==='despesa'?'Despesa':'Extra';
  const tipoClass = parsed.tipo==='receita'?'pos':parsed.tipo==='despesa'?'neg':'warn';

  document.getElementById('voz-content').innerHTML = `
    <div class="voice-result">
      <div class="voice-result-label">Voce disse</div>
      <div class="voice-result-text">"${textoOriginal}"</div>
    </div>
    <div class="voice-parsed">
      <div class="vp-row"><span class="vp-label">Descricao</span><span class="vp-val">${parsed.descricao}</span></div>
      <div class="vp-row"><span class="vp-label">Valor</span><span class="vp-val ${tipoClass}">R$ ${parsed.valor.toLocaleString('pt-BR',{minimumFractionDigits:2})}</span></div>
      <div class="vp-row"><span class="vp-label">Tipo</span><span class="vp-val ${tipoClass}">${tipoLabel}</span></div>
      <div class="vp-row"><span class="vp-label">Confianca</span><span style="font-size:12px;color:${corConfianca};font-weight:500">${parsed.confianca}</span></div>
    </div>
    <div class="voice-actions">
      <button class="btn-cancel-v" onclick="abrirVoz()"><i class="ti ti-refresh" style="margin-right:4px"></i>Gravar de novo</button>
      <button class="btn-confirm" onclick="confirmarVoz('${parsed.descricao}',${parsed.valor},'${parsed.tipo}')"><i class="ti ti-check" style="margin-right:4px"></i>Confirmar</button>
    </div>`;
}

function confirmarVoz(desc, valor, tipo){
  const pid = document.getElementById('voz-periodo').value;
  const p = D.periodos.find(x=>x.id===pid);
  if(!p) return;
  const valorFinal = tipo==='receita' ? valor : -valor;
  const hoje = new Date();
  const df = String(hoje.getDate()).padStart(2,'0')+'/'+String(hoje.getMonth()+1).padStart(2,'0')+'/'+hoje.getFullYear();
  p.lancamentos.push({id:'l'+Date.now(), desc, tipo, valor:valorFinal, data:df});
  if(tipo==='receita') p.bruto += valor;
  save(D);
  closeModal();
  R.inicio();
  alert('Lancamento salvo com sucesso!');
}

  if(b)b.className='tbtn t'+map[t];
}

function salvar(){
  const desc=document.getElementById('f-d').value.trim();
  const vr=parseFloat(document.getElementById('f-v').value);
  const di=document.getElementById('f-dt').value;
  const pid=document.getElementById('f-p').value;
  if(!desc||isNaN(vr)||vr<=0){alert('Preencha descricao e valor.');return;}
  if(pid==='nova'){novaQ();return;}
  const valor=tipoSel==='receita'?vr:-vr;
  const p=D.periodos.find(x=>x.id===pid);
  if(!p)return;
  const pts=di.split('-');
  const df=pts.length===3?`${pts[2]}/${pts[1]}/${pts[0]}`:di;
  p.lancamentos.push({id:'l'+Date.now(),desc,tipo:tipoSel,valor,data:df});
  if(tipoSel==='receita')p.bruto+=vr;
  save(D);
  document.getElementById('f-d').value='';
  document.getElementById('f-v').value='';
  alert('Salvo com sucesso!');
  R.inicio();
}

function abrirP(id){
  const p=D.periodos.find(x=>x.id===id);
  if(!p)return;
  const s=sal(p);
  document.getElementById('mc').innerHTML=`
    <div class="modal-hdr">${p.label}<button class="mclose" onclick="closeModal()"><i class="ti ti-x"></i></button></div>
    <div class="mgrid" style="margin-bottom:10px">
      <div class="metric"><div class="mlabel">Saldo</div><div class="mval ${s>=0?'g':'r'}">${fmt(s)}</div></div>
      <div class="metric"><div class="mlabel">Por socio</div><div class="mval g">${fmt(s/2)}</div></div>
    </div>
    ${p.lancamentos.map(l=>`<div class="litem"><div class="linfo"><div class="ldesc">${l.desc}</div><div class="lmeta">${l.data} ${badgeH(l.tipo)}</div></div><div style="display:flex;align-items:center;gap:4px"><span class="lval ${l.valor>=0?'pos':'neg'}">${l.valor>=0?'+':''}${fmt(l.valor)}</span><button class="btn-del" onclick="delL('${p.id}','${l.id}')"><i class="ti ti-trash"></i></button></div></div>`).join('')}`;
  document.getElementById('ov').classList.add('open');
}

function delL(pid,lid){
  if(!confirm('Remover este lancamento?'))return;
  const p=D.periodos.find(x=>x.id===pid);
  if(p){p.lancamentos=p.lancamentos.filter(l=>l.id!==lid);save(D);}
  closeModal();R.historico();
}

function novaQ(){
  document.getElementById('mc').innerHTML=`
    <div class="modal-hdr">Nova quinzena<button class="mclose" onclick="closeModal()"><i class="ti ti-x"></i></button></div>
    <div class="fgroup"><label class="flabel">Periodo</label><input type="text" id="nq-l" placeholder="16/05 a 31/05/2026"/></div>
    <div class="fgroup"><label class="flabel">Mes/Ano</label><input type="text" id="nq-m" placeholder="05/2026"/></div>
    <div class="fgroup"><label class="flabel">Bruto do recibo (R$)</label><input type="number" id="nq-b" placeholder="0,00" step="0.01" min="0"/></div>
    <button class="btn-p" onclick="criarQ()"><i class="ti ti-check"></i>Criar</button>`;
  document.getElementById('ov').classList.add('open');
}

function criarQ(){
  const label=document.getElementById('nq-l').value.trim();
  const mes=document.getElementById('nq-m').value.trim();
  const bruto=parseFloat(document.getElementById('nq-b').value);
  if(!label||!mes||isNaN(bruto)){alert('Preencha todos os campos.');return;}
  D.periodos.push({id:'p'+Date.now(),label,mes,bruto,lancamentos:[{id:'l'+Date.now(),desc:'Servicos COOTRACAM',tipo:'receita',valor:bruto,data:label.split(' ')[0]}]});
  save(D);closeModal();R.inicio();
  alert('Quinzena criada!');
}

function closeModal(e){
  if(e&&e.target!==document.getElementById('ov'))return;
  document.getElementById('ov').classList.remove('open');
}

R.inicio();
</script>
</body>
</html>
